{% extends "base.html" %}
{% load i18n %}

{% block page-title %}{% trans "IE Judge Links" %}{% endblock %}

{% block content %}
<div id="vueMount">
  <ie-judge-links></ie-judge-links>
</div>
{% endblock content %}

{% block js %}
<script>
  window.NEKOSPEECH_URL = '{{ nekospeech_url|escapejs }}';
  window.ieConfig = {
    tournamentId: {{ tournament_id }},
    tournamentSlug: '{{ tournament_slug|escapejs }}',
    eventId: {{ event_id }},
    roundNumber: {{ round_number }},
    apiBaseUrl: '{{ api_base_url|escapejs }}',
    apiKey: '{{ nekospeech_api_key|default:""|escapejs }}',
    token: '{{ ie_token|default:""|escapejs }}',
  };
  window.vueData = {};
</script>
{{ block.super }}
{% endblock js %}
